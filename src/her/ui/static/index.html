<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0d10" />
  <title>her</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="dot"></span>
      <span>her</span>
      <span class="subtitle" id="cfg-line">…</span>
    </div>
    <div class="controls">
      <div class="indicators" id="indicators">
        <span class="ind" data-key="listening">listening</span>
        <span class="ind" data-key="seeing">seeing</span>
        <span class="ind" data-key="thinking">thinking</span>
        <span class="ind" data-key="speaking">speaking</span>
      </div>
      <select id="lang-select" title="Lingua di Samantha (applicata alla prossima sessione)"></select>
      <button id="settings-btn" class="icon-btn" type="button" title="Preferenze" aria-label="Preferenze">⚙</button>
      <button id="toggle-btn">Start</button>
    </div>
  </header>

  <!-- Preferences overlay: edit modes/models/variables/API keys (saved to the
       local .env) and read the changelog. Hidden until the gear is clicked. -->
  <div id="settings-overlay" class="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <header class="modal-head">
        <h2 id="settings-title">Preferenze</h2>
        <button id="settings-close" class="icon-btn" type="button" aria-label="Chiudi">✕</button>
      </header>
      <nav class="modal-tabs" id="settings-tabs">
        <button class="tab active" data-tab="prefs" type="button">Preferenze</button>
        <button class="tab" data-tab="changelog" type="button">Changelog</button>
      </nav>
      <div class="modal-body">
        <form id="settings-form" class="tab-panel" data-panel="prefs"></form>
        <div class="tab-panel changelog" data-panel="changelog" hidden id="changelog-body"></div>
      </div>
      <footer class="modal-foot" id="settings-foot">
        <span id="settings-msg" class="settings-msg"></span>
        <div class="modal-foot-actions">
          <button id="settings-cancel" type="button" class="btn-ghost">Annulla</button>
          <button id="settings-save" type="button" class="btn-primary">Salva</button>
        </div>
      </footer>
    </div>
  </div>

  <main>
    <section class="terminal" id="terminal" aria-live="polite"></section>
  </main>

  <section class="input-bar">
    <ul id="cmd-menu" class="cmd-menu" hidden></ul>
    <form id="text-form" autocomplete="off">
      <span class="prompt">›</span>
      <button id="attach-btn" type="button" class="icon-btn" title="Allega un file">📎</button>
      <!-- Extensions only: in WKWebView (the packaged app) adding explicit image
           MIME types here narrows the native file panel to images, leaving the
           other formats unselectable. The server validates the type regardless. -->
      <input id="file-input" type="file" hidden
             accept=".pdf,.md,.txt,.docx,.jpg,.jpeg,.png" />
      <input id="text-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="…" />
      <button id="send-btn" type="submit">send</button>
    </form>
  </section>

  <footer>
    <span id="status-line">disconnesso</span>
    <span id="a11y-badge" class="a11y-badge" hidden aria-live="polite"></span>
  </footer>

  <!-- Hidden — webcam is captured silently. Samantha "sees" without showing. -->
  <video id="cam" autoplay playsinline muted hidden></video>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
